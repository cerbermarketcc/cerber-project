services:
  - type: web
    name: cerber-project
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: NOWPAYMENTS_API_KEY
        sync: false
      - key: NOWPAYMENTS_IPN_SECRET
        sync: false
      - key: NOWPAYMENTS_PUBLIC_KEY
        sync: false
      - key: NOWPAYMENTS_LTC_WALLET
        sync: false
      - key: NOWPAYMENTS_PAYOUTS_ENABLED
        sync: false
      - key: NOWPAYMENTS_EMAIL
        sync: false
      - key: NOWPAYMENTS_PASSWORD
        sync: false
      - key: NOWPAYMENTS_PAYOUT_2FA_SECRET
        sync: false
      - key: PROVERKA_BOT_TOKEN
        sync: false
      - key: SITE_NOTIFY_BOT_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        value: "https://cerber-project.onrender.com"
